<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | National E-Voting Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- LAYER 1: ACCESSIBILITY -->
    <div class="accessibility-bar">
        <div class="container">
            <div>NATIONAL DIGITAL INFRASTRUCTURE</div>
            <div>Official Portal | Security Level: High</div>
        </div>
    </div>

    <!-- LAYER 2: BRANDING -->
    <header class="main-branded-header">
        <div class="container">
            <div class="emblem-section">
                <img src="img/logo.png" alt="MyVote Logo">
                <div class="title-box">
                    <h1>National E-Voting Authority</h1>
                    <p>Digital Democratic Services Division</p>
                </div>
            </div>
            <div class="side-logo">
                <h2 style="color: var(--uidai-dark); font-weight: 900; font-size: 28px; letter-spacing: -1.5px;">MyVote</h2>
            </div>
        </div>
    </header>

    <!-- LAYER 3: NAVIGATION -->
    <nav>
        <div class="container">
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="auth-panel">
            <h2 style="color: var(--uidai-dark); margin-bottom: 8px; font-weight: 800;">Official Login</h2>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 30px;">Access the secure live ballot using your Voter Identity credentials.</p>
            
            <div class="form-group-v2">
                <label>Voter Identity ID</label>
                <input type="text" id="voter_id" placeholder="Enter Voter ID (e.g., V123)">
            </div>
            
            <div class="form-group-v2">
                <label>Secure Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            
            <button id="loginBtn" class="btn-submit-ballot">CONTINUE TO BALLOT <i class="fas fa-arrow-right"></i></button>
            <div style="text-align: center; margin-top: 25px; font-size: 13px; color: var(--text-muted);">
                Don't have a digital account? <a href="register.html" style="color: var(--uidai-blue); font-weight: 700; text-decoration: none;">Enrol Now</a>
            </div>
        </div>
    </div>

    <div id="notification-box"></div>

    <script src="js/utils.js"></script>
    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const voter = document.getElementById('voter_id').value;
            const pass = document.getElementById('password').value;
            if (voter === 'admin' && pass === 'admin123') {
                localStorage.setItem('token', 'admin-bypass');
                localStorage.setItem('voter_id', 'admin');
                window.location.href = 'admin.html'; return;
            }
            try {
                const res = await fetch("/api/login", {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ voter_id: voter, password: pass })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('voter_id', voter);
                    window.location.href = 'dashboard.html';
                } else { showMessage(data.message || "Unauthorized Access"); }
            } catch (err) { showMessage("Server Connection Failed"); }
        });
    </script>
</body>
</html>
